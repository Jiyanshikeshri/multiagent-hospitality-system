version: '3.8'

services:

  app:
    build: .
    container_name: travel_app
    ports:
      - "9000:8501"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DB_HOST: db 

  db:
    image: mysql:8
    container_name: travel_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_travel
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: